name: pr-test-build

on:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build
        run: |
          go build -o test-output-server ./cmd/server
          go build -o test-output-worker ./cmd/worker
          go build -o test-output-migrate ./cmd/migrate
          rm -f test-output-server test-output-worker test-output-migrate
