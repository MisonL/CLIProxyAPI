services:
  cli-proxy-api:
    image: ${CLI_PROXY_IMAGE}
    container_name: ${CLI_PROXY_CONTAINER_NAME:-cliproxyapi}
    environment:
      DEPLOY: ${DEPLOY:-}
      MANAGEMENT_STATIC_PATH: ${MANAGEMENT_STATIC_PATH:-/workspace/static}
      USAGE_BACKUP_DIR: ${USAGE_BACKUP_DIR:-/workspace/usage-backups}
      CPA_PLATFORM_ROLE: ${CPA_PLATFORM_ROLE:-server}
      CPA_PLATFORM_DATABASE_URL: ${CPA_PLATFORM_DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/cliproxy?sslmode=disable}
      CPA_PLATFORM_DATABASE_SCHEMA: ${CPA_PLATFORM_DATABASE_SCHEMA:-controlplane}
      CPA_PLATFORM_REDIS_URL: ${CPA_PLATFORM_REDIS_URL:-redis://redis:6379/0}
      CPA_PLATFORM_NATS_URL: ${CPA_PLATFORM_NATS_URL:-nats://nats:4222}
      CPA_PLATFORM_NATS_STREAM: ${CPA_PLATFORM_NATS_STREAM:-CPA_EVENTS}
      CPA_PLATFORM_TENANT_SLUG: ${CPA_PLATFORM_TENANT_SLUG:-default}
      CPA_PLATFORM_TENANT_NAME: ${CPA_PLATFORM_TENANT_NAME:-Default Tenant}
      CPA_PLATFORM_WORKSPACE_SLUG: ${CPA_PLATFORM_WORKSPACE_SLUG:-default}
      CPA_PLATFORM_WORKSPACE_NAME: ${CPA_PLATFORM_WORKSPACE_NAME:-Default Workspace}
      CPA_MASTER_KEY: ${CPA_MASTER_KEY:-change-me}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "127.0.0.1:${CLI_PROXY_PUBLIC_PORT:-8317}:8317"
    volumes:
      - ./config/config.yaml:/CLIProxyAPI/config.yaml
      - ./data/logs:/CLIProxyAPI/logs
      - ./data/static:/workspace/static
      - ./data/usage-backups:/workspace/usage-backups
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - nats

  cli-proxy-worker:
    image: ${CLI_PROXY_IMAGE}
    container_name: ${CLI_PROXY_WORKER_CONTAINER_NAME:-cliproxyapi-worker}
    command: ["./CLIProxyAPI-worker"]
    environment:
      CPA_PLATFORM_ROLE: worker
      CPA_PLATFORM_DATABASE_URL: ${CPA_PLATFORM_DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/cliproxy?sslmode=disable}
      CPA_PLATFORM_DATABASE_SCHEMA: ${CPA_PLATFORM_DATABASE_SCHEMA:-controlplane}
      CPA_PLATFORM_REDIS_URL: ${CPA_PLATFORM_REDIS_URL:-redis://redis:6379/0}
      CPA_PLATFORM_NATS_URL: ${CPA_PLATFORM_NATS_URL:-nats://nats:4222}
      CPA_PLATFORM_NATS_STREAM: ${CPA_PLATFORM_NATS_STREAM:-CPA_EVENTS}
      CPA_PLATFORM_TENANT_SLUG: ${CPA_PLATFORM_TENANT_SLUG:-default}
      CPA_PLATFORM_TENANT_NAME: ${CPA_PLATFORM_TENANT_NAME:-Default Tenant}
      CPA_PLATFORM_WORKSPACE_SLUG: ${CPA_PLATFORM_WORKSPACE_SLUG:-default}
      CPA_PLATFORM_WORKSPACE_NAME: ${CPA_PLATFORM_WORKSPACE_NAME:-Default Workspace}
      CPA_MASTER_KEY: ${CPA_MASTER_KEY:-change-me}
      TZ: ${TZ:-Asia/Shanghai}
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - nats

  postgres:
    image: postgres:17-alpine
    container_name: ${PLATFORM_POSTGRES_CONTAINER_NAME:-cliproxyapi-postgres}
    environment:
      POSTGRES_DB: ${PLATFORM_POSTGRES_DB:-cliproxy}
      POSTGRES_USER: ${PLATFORM_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${PLATFORM_POSTGRES_PASSWORD:-postgres}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "127.0.0.1:${PLATFORM_POSTGRES_PUBLIC_PORT:-15432}:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    container_name: ${PLATFORM_REDIS_CONTAINER_NAME:-cliproxyapi-redis}
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ./data/redis:/data
    restart: unless-stopped

  nats:
    image: nats:2.11-alpine
    container_name: ${PLATFORM_NATS_CONTAINER_NAME:-cliproxyapi-nats}
    command: ["-js", "--store_dir=/data"]
    volumes:
      - ./data/nats:/data
    restart: unless-stopped
